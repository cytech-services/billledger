services:
  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_PATH: /data/bills.db
    volumes:
      - ${BILLLEDGER_DATA_DIR:-./data}:/data
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: http://api:3001
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${BILLLEDGER_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
